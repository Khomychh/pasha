<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Паша</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@700&family=Inter:wght@400;500;600&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body class="chat-page">
  <div class="chat-screen">
    <header class="chat-header">
      <div class="avatar"><img src="/static/img/pasha.jpg" alt="Паша" /></div>
      <div class="chat-header-text">
        <span class="name">Паша</span>
        <span class="status"><span class="status-dot"></span>у апарата</span>
      </div>
      <a class="logout-link" href="/logout" onclick="return false" id="logout-link">вийти</a>
    </header>

    <div class="messages" id="messages"></div>

    <form class="composer" id="composer">
      <textarea
        id="input"
        rows="1"
        placeholder="напиши щось..."
        required
      ></textarea>
      <button type="submit" id="send-btn" aria-label="Надіслати">→</button>
    </form>
  </div>

  <form id="logout-form" method="post" action="/logout" style="display: none"></form>

  <script src="/static/js/chat.js"></script>
</body>
</html>
