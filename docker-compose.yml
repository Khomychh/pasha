services:
  app:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - pasha_data:/app/data
    expose:
      - "8000"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app

volumes:
  pasha_data:
  caddy_data:
  caddy_config:
